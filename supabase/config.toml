# Supabase local stack config for MyCareProvider.
#
# Hand-written (not produced by `supabase init`) because C2 scaffolds the
# files without running `supabase start` - Docker is a per-developer concern.
# All ports and values match the Supabase CLI defaults so `supabase start`
# on a developer laptop picks this up without edits.
#
# After `supabase start` completes, point Authentication -> Hooks ->
# "Custom Access Token" at public.custom_access_token_hook (already declared
# under [auth.hook.custom_access_token] below for local dev; the dashboard
# setting is still required in hosted environments).

project_id = "mycareprovider"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

# C3a provider document vault. Uploads land in quarantine/<profile_id>/... and
# are promoted to clean/<profile_id>/... by the verification pipeline after a
# MIME/scan check. Bucket is private; reads go through signed URLs issued by
# Server Actions. Mirror in hosted environments is created by 0004 via an
# insert into storage.buckets so the local and hosted configs agree.
[storage.buckets.provider-docs]
public = false
file_size_limit = "25MiB"
allowed_mime_types = ["application/pdf", "image/jpeg", "image/png", "image/webp", "image/heic"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[edge_runtime]
enabled = true

[analytics]
enabled = false
